spring.application.name=Kasir Sederhana
server.port=8080
spring.thymeleaf.cache=false

# ===================================================================
# DATABASE CONFIGURATION (MySQL XAMPP)
# ===================================================================

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/kasir_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# NOTES:
# - Tabel akan otomatis dibuat saat aplikasi pertama kali jalan
# - Kalau tabel tidak muncul, pakai file: create_tables_manual.sql
# - Default XAMPP: username=root, password= (kosong)
# - Kalau pakai password MySQL, isi di spring.datasource.password
# ===================================================================

# Untuk disable database (pakai in-memory), comment semua config di atas
# dan restart aplikasi

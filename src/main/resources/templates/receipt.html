<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pembayaran</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f0fdf4;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .receipt {
            background: white;
            width: 450px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
            box-shadow: 0 4px 6px rgba(22, 101, 52, 0.1);
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px solid #d1fae5;
            padding-bottom: 20px;
            margin-bottom: 24px;
        }

        .receipt-header h1 {
            font-size: 1.5em;
            margin-bottom: 8px;
            color: #166534;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .receipt-header p {
            color: #6b7280;
            font-size: 0.9em;
        }

        .receipt-info {
            margin-bottom: 24px;
            font-size: 0.85em;
            color: #374151;
        }

        .receipt-info div {
            margin-bottom: 6px;
        }

        .receipt-items {
            border-bottom: 2px solid #d1fae5;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .item {
            margin-bottom: 14px;
        }

        .item-name {
            font-weight: 600;
            color: #166534;
            margin-bottom: 4px;
        }

        .item-details {
            display: flex;
            justify-content: space-between;
            margin-left: 0;
            color: #6b7280;
            font-size: 0.9em;
        }

        .receipt-total {
            margin-bottom: 24px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1em;
            color: #374151;
        }

        .total-row.grand-total {
            font-size: 1.4em;
            font-weight: 700;
            border-top: 2px solid #d1fae5;
            padding-top: 14px;
            margin-top: 14px;
            color: #15803d;
        }

        .receipt-footer {
            text-align: center;
            border-top: 2px solid #d1fae5;
            padding-top: 20px;
            font-size: 0.85em;
            color: #6b7280;
        }

        .receipt-footer p {
            margin-bottom: 8px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        .btn-primary {
            background: #16a34a;
            color: white;
        }

        .btn-primary:hover {
            background: #15803d;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        @media print {
            body {
                background: white;
            }
            .buttons {
                display: none;
            }
            .receipt {
                border: none;
                background: white;
                color: black;
            }
        }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="receipt-header">
            <h1>KASIR SEDERHANA</h1>
            <p>Terima kasih atas pembelian Anda</p>
        </div>

        <div class="receipt-info">
            <div>ID Transaksi: <span th:text="${transaction.id}"></span></div>
            <div>Tanggal: <span th:text="${#temporals.format(transaction.date, 'dd/MM/yyyy HH:mm:ss')}"></span></div>
        </div>

        <div class="receipt-items">
            <div class="item" th:each="item : ${transaction.items}">
                <div class="item-name" th:text="${item.product.name}"></div>
                <div class="item-details">
                    <span th:text="${item.quantity} + ' x Rp ' + ${#numbers.formatDecimal(item.product.price, 0, 'COMMA', 0, 'POINT')}"></span>
                    <span th:text="'Rp ' + ${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT')}"></span>
                </div>
            </div>
        </div>

        <div class="receipt-total">
            <div class="total-row">
                <span>Total:</span>
                <span th:text="'Rp ' + ${#numbers.formatDecimal(transaction.total, 0, 'COMMA', 0, 'POINT')}"></span>
            </div>
            <div class="total-row">
                <span>Bayar:</span>
                <span th:text="'Rp ' + ${#numbers.formatDecimal(transaction.payment, 0, 'COMMA', 0, 'POINT')}"></span>
            </div>
            <div class="total-row grand-total">
                <span>Kembalian:</span>
                <span th:text="'Rp ' + ${#numbers.formatDecimal(transaction.change, 0, 'COMMA', 0, 'POINT')}"></span>
            </div>
        </div>

        <div class="receipt-footer">
            <p>Simpan struk ini sebagai bukti pembayaran</p>
            <p>Barang yang sudah dibeli tidak dapat dikembalikan</p>
        </div>

        <div class="buttons">
            <a href="/" class="btn btn-primary">Transaksi Baru</a>
            <button onclick="window.print()" class="btn btn-secondary">Cetak</button>
        </div>
    </div>
</body>
</html>
